            { name: "spcwar", nameZh: "太空战", file: "spcwar.bas", ported: true, desc: "策略 - 太空战 - 飞船战斗：攻击/护盾/修理", author: "" },
            { name: "splat", nameZh: "自由落体", file: "splat.bas", ported: true, desc: "模拟 - 自由落体 - 在正确高度拉开降落伞", author: "John F. Yegge" },
            { name: "stars", nameZh: "数星星", file: "stars.bas", ported: true, desc: "猜谜 - 数星星 - 数出星星数量(1-20)", author: "" },
            { name: "stock", nameZh: "股票模拟", file: "stock.bas", ported: true, desc: "模拟 - 股票市场 - 低买高卖赚取利润", author: "" },
            { name: "synonm", nameZh: "同义词", file: "synonm.bas", ported: true, desc: "问答 - 同义词 - 给出8个单词的同义词", author: "Walter J. Koetke" },
            { name: "target", nameZh: "打靶", file: "target.bas", ported: true, desc: "猜谜 - 打靶 - 5发炮弹击中随机靶标", author: "H. David Crockett" },
            { name: "tictac", nameZh: "井字棋", file: "tictac.bas", ported: true, desc: "游戏 - 井字棋 - 与电脑对战井字棋", author: "Tom Kloos" },
            { name: "tower", nameZh: "汉诺塔", file: "tower.bas", ported: true, desc: "益智 - 汉诺塔 - 将圆盘从A柱移到C柱", author: "Charles Lund" },
            { name: "train", nameZh: "思维列车", file: "train.bas", ported: true, desc: "猜谜 - 思维列车 - 预测下一个数字比当前高还是低", author: "Walter J. Koetke" },
            { name: "trap", nameZh: "飞碟射击", file: "trap.bas", ported: true, desc: "模拟 - 飞碟射击 - 5轮射击飞碟比赛", author: "" },
            { name: "ugly", nameZh: "乌龟绘图", file: "ugly.bas", ported: true, desc: "创意 - 乌龟绘图 - 在20x20网格上画图", author: "Mark Maslar" },
            { name: "war", nameZh: "战争(纸牌)", file: "war.bas", ported: true, desc: "纸牌 - 战争 - 经典纸牌对战游戏", author: "" },
            { name: "war2", nameZh: "海战2", file: "war2.bas", ported: true, desc: "策略 - 海战2 - 两支舰队的海战", author: "Bob Dores" },
            { name: "wekday", nameZh: "星期计算", file: "wekday.bas", ported: true, desc: "工具 - 星期计算 - 计算任意日期的星期", author: "" },
            { name: "word", nameZh: "单词拼写", file: "word.bas", ported: true, desc: "益智 - 单词拼写 - 重组5个乱序单词", author: "Charles Reid" },
            { name: "yahtze", nameZh: "快艇骰子", file: "yahtze.bas", ported: true, desc: "赌场 - 快艇骰子 - 每轮3次掷5个骰子", author: "" },
            { name: "zoop", nameZh: "猜数交换", file: "zoop.bas", ported: true, desc: "猜谜 - 猜数交换 - 猜数字或让电脑猜", author: "" }
        ];

        const tbody = document.getElementById('game-list');
        let portedCount = 0;

        games.forEach((game, index) => {
            const row = document.createElement('tr');
            const htmlLink = game.ported
                ? `<a href="games/${game.name}.html">开始游戏</a>`
                : `<span style="color: #444;">即将推出</span>`;

            if (game.ported) portedCount++;

            row.innerHTML = `
                <td>${index + 1}</td>
                <td class="game-name">${game.name.toUpperCase()}（${game.nameZh}）</td>
                <td>${game.author || '-'}</td>
                <td>${htmlLink}</td>
                <td><a href="maurymarkowitz/101-BASIC-Computer-Games/${game.file}" class="basic-link" target="_blank">查看源码</a></td>
                <td style="color: ${game.ported ? '#00ff00' : '#666'};">${game.desc || game.name.toUpperCase()}</td>
            `;
            tbody.appendChild(row);
        });

        document.getElementById('ported-count').textContent = portedCount;
    </script>
</body>
</html>
