            font-size: 0.9em;
            color: #00aa00;
        }

            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #111;
        }

            background: #003300;
            color: #00ff00;
            padding: 12px 15px;
            text-align: left;
            border: 1px solid #00ff00;
            font-weight: bold;
            position: sticky;
            top: 0;

        td {
            padding: 10px 15px;
            border: 1px solid #004400;
        }

        tr:nth-child(even) {
            background: #0a0a0a;
        }

        tr:hover {
            background: #002200;
        }

        .game-name {

        }

        a {

            text-decoration: none;
            padding: 4px 10px;
            border: 1px solid #00ffff;

        a:hover {

            color: #000;

            margin-top: 10px;

            const htmlLink = game.ported 
                ? `<a href="games/${game.name}.html">Play</a>`
                : `<span style="color: #444;">Coming Soon</span>`;
            
            if (game.ported) portedCount++;

            row.innerHTML = `
                <td>${index + 1}</td>
                <td class="game-name">${game.name.toUpperCase()}</td>
                <td>${game.author || '-'}</td>
                <td>${htmlLink}</td>
                <td><a href="maurymarkowitz/101-BASIC-Computer-Games/${game.file}" class="basic-link" target="_blank">View Code</a></td>
