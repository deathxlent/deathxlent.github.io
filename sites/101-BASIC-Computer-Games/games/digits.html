<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DIGITS - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">DIGITS.BAS - Digits</span><div class="terminal-controls"><a href="../index.html">← BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'DIGITS'});
async function run() {
  await t.delay(300);
  t.print("THIS IS A GAME OF GUESSING.");
  let e = await t.input("FOR INSTRUCTIONS, TYPE '1', ELSE TYPE '0'");
  if (e === "1") {
    t.print("PLEASE TAKE A PIECE OF PAPER AND WRITE DOWN");
    t.print("THE DIGITS '0', '1', OR '2' THIRTY TIMES AT RANDOM.");
    t.print("ARRANGE THEM IN THREE LINES OF TEN DIGITS.");
    t.print("I WILL ASK FOR THEM 10 AT A TIME.");
    t.print("I WILL ALWAYS GUESS FIRST, AND THEN LOOK AT YOUR");
    t.print("NEXT NUMBER TO SEE IF I WAS RIGHT. BY PURE LUCK I");
    t.print("OUGHT TO BE RIGHT 10 TIMES. BUT I HOPE TO DO BETTER");
    t.print("THAN THAT ****");
  }
  while (true) {
    let M = Array.from({length:27},()=>[1,1,1]);
    let K = [[9,9],[9,9],[9,9]];
    let L = Array.from({length:9},()=>[3,3,3]);
    L[0][0]=2; L[4][1]=2; L[8][2]=2;
    let Z = 26, Z1 = 8, Z2 = 2;
    let X = 0;
    for (let T = 0; T < 3; T++) {
      t.print("");
      t.print("TEN NUMBERS PLEASE");
      let inp = await t.input("");
      let N = inp.split(',').map(s=>parseInt(s.trim()));
      if (N.length < 10) { t.print("PLEASE ENTER 10 NUMBERS"); T--; continue; }
      let ok = true;
      for (let i = 0; i < 10; i++) {
        if (N[i] < 0 || N[i] > 2) { ok = false; break; }
      }
      if (!ok) { t.print("USE ONLY THE DIGITS '0', '1', OR '2'."); T--; continue; }
      t.print("");
      t.print("MY GUESS    YOUR NO.    RESULT    NO. RIGHT");
      for (let U = 0; U < 10; U++) {
        let n = N[U];
        let best = 0, bestG = 0;
        for (let j = 0; j < 3; j++) {
          let s1 = 1 * K[Z2][j] * 1 * L[Z1][j] * 1 * M[Z][j];
          if (s1 > best || (s1 === best && Math.random() < 0.5)) {
            best = s1; bestG = j;
          }
        }
        let result = (bestG === n) ? "RIGHT" : "WRONG";
        if (bestG === n) X++;
        t.print("   " + bestG + "         " + n + "        " + result + "       " + X);
        M[Z][n]++;
        L[Z1][n]++;
        K[Z2][n]++;
        Z = Z - Math.floor(Z/9)*9;
        Z = 3*Z + n;
        Z1 = Z - Math.floor(Z/9)*9;
        Z2 = n;
      }
    }
    t.print("");
    if (X > 10) t.print("I GUESSED MORE THAN 1/3 OF YOUR NUMBERS. I WIN.");
    else if (X < 10) t.print("I GUESSED LESS THAN 1/3 OF YOUR NUMBERS. YOU BEAT ME. CONGRATULATIONS.");
    else t.print("I GUESSED EXACTLY 1/3 OF YOUR NUMBERS. IT IS A TIE GAME.");
    let again = await t.input("DO YOU WANT TO TRY AGAIN (1 FOR YES, 0 FOR NO)");
    if (again !== "1") break;
  }
  t.print("THANKS FOR THE GAME.");
  await t.delay(2000);
  window.location.href = "../index.html";
}
run();
</script>
</body>
</html>
