<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LETTER - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">LETTER.BAS - Letter Count</span><div class="terminal-controls"><a href="../index.html">← BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'LETTER'});
async function run() {
  await t.delay(300);
  t.print("LETTER COUNT");
  t.print("ENTER A SENTENCE AND I WILL COUNT THE LETTERS.");
  while (true) {
    let s = await t.input("YOUR SENTENCE");
    if (s.toUpperCase() === "END") break;
    let counts = {};
    for (let ch of s.toUpperCase()) {
      if (ch >= 'A' && ch <= 'Z') { counts[ch] = (counts[ch] || 0) + 1; }
    }
    t.print("LETTER COUNT:");
    for (let c in counts) t.print(c + ": " + counts[c]);
  }
  t.print("BYE");
  await t.delay(1500);
  window.location.href="../index.html";
}
run();
</script>
</body>
</html>
