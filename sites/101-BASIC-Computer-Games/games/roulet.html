<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ROULET - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">ROULET.BAS - Roulette</span><div class="terminal-controls"><a href="../index.html">← BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'ROULET'});
async function run() {
  await t.delay(300);
  t.print("ROULETTE");
  t.print("YOU START WITH $500. BET ON NUMBERS 0-36.");
  t.print("A WIN ON A NUMBER PAYS 36 TO 1.");
  let money = 500;
  while (true) {
    if (money <= 0) { t.print("YOU'RE BROKE!"); break; }
    t.print("YOU HAVE $" + money);
    let bet = parseInt(await t.input("YOUR BET"));
    if (bet < 1 || bet > money) continue;
    let num = parseInt(await t.input("NUMBER (0-36)"));
    if (num < 0 || num > 36) continue;
    money -= bet;
    let spin = Math.floor(Math.random() * 37);
    t.print("SPIN: " + spin);
    if (spin === 0) t.print("GREEN!");
    else if (spin % 2 === 0) t.print("RED!");
    else t.print("BLACK!");
    if (spin === num) { t.print("YOU WIN!"); money += bet * 36; }
    else t.print("YOU LOSE.");
    let again = await t.input("PLAY AGAIN (YES/NO)");
    if (again.toUpperCase() !== "YES") break;
  }
  t.print("YOU END WITH $" + money);
  await t.delay(2000);
  window.location.href="../index.html";
}
run();
</script>
</body>
</html>
