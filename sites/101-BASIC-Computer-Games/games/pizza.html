<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PIZZA - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">PIZZA.BAS - Pizza Order</span><div class="terminal-controls"><a href="../index.html">← BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'PIZZA'});
async function run() {
  await t.delay(300);
  t.print("PIZZA ORDER");
  t.print("WELCOME TO THE PIZZA ORDERING SYSTEM.");
  let total = 0;
  while (true) {
    let size = parseInt(await t.input("SIZE: 1=SMALL($6), 2=MEDIUM($9), 3=LARGE($12)"));
    let price = size === 1 ? 6 : size === 2 ? 9 : size === 3 ? 12 : 0;
    if (price === 0) continue;
    let toppings = parseInt(await t.input("NUMBER OF TOPPINGS ($1.50 EACH)"));
    price += toppings * 1.5;
    let delivery = await t.input("DELIVERY? (YES/NO)");
    if (delivery.toUpperCase() === "YES") price += 2;
    t.print("YOUR PIZZA COSTS $" + price.toFixed(2));
    total += price;
    t.print("TOTAL SO FAR: $" + total.toFixed(2));
    let more = await t.input("ORDER ANOTHER? (YES/NO)");
    if (more.toUpperCase() !== "YES") break;
  }
  t.print("THANK YOU. YOUR TOTAL IS $" + total.toFixed(2));
  await t.delay(2000);
  window.location.href="../index.html";
}
run();
</script>
</body>
</html>
