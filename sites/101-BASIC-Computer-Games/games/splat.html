<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SPLAT - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">SPLAT.BAS - Splat</span><div class="terminal-controls"><a href="../index.html">â†?BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-credit">Written by: John F. Yegge</div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'SPLAT'});
async function run() {
  await t.delay(300);
  t.print("SPLAT - FREE FALL");
  t.print("YOU ARE FALLING FROM A GREAT HEIGHT.");
  t.print("PULL THE RIPCORD AT THE RIGHT TIME TO SURVIVE.");
  let M = Math.floor(Math.random() * 900) + 100;
  let H = Math.floor(Math.random() * 900) + 100;
  t.print("YOU ARE AT " + M + " METERS. SAFE LANDING ALTITUDE IS " + H + " METERS.");
  let pull = parseInt(await t.input("PULL RIPCORD AT WHAT ALTITUDE"));
  if (pull < 0) { t.print("NEGATIVE?!"); pull = Math.abs(pull); }
  if (pull > M) { t.print("YOU'RE NOT THAT HIGH!"); }
  else if (pull < H) { t.print("SPLAT! YOU HIT THE GROUND!"); }
  else {
    let diff = pull - H;
    if (diff > 50) t.print("YOU DRIFTED A BIT BUT LANDED SAFELY.");
    else t.print("PERFECT LANDING!");
  }
  await t.delay(3000);
  window.location.href="../index.html";
}
run();
</script>
</body>
</html>
