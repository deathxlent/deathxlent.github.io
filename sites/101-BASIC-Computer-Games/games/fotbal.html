<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FOTBAL - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">FOTBAL.BAS - NFU Football</span><div class="terminal-controls"><a href="../index.html">â†?BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-credit">Written by: Raymond W. Miseyka</div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'FOTBAL'});
const plays = ["PITCHOUT","TRIPLE REVERSE","DRAW","QB SNEAK","END AROUND","DOUBLE REVERSE","LEFT SWEEP","RIGHT SWEEP","OFF TACKLE","WISHBONE OPTION","FLARE PASS","SCREEN PASS","ROLL OUT OPTION","RIGHT CURL","LEFT CURL","WISHBONE OPTION","SIDELINE PASS","(18)","RAZZLE DAZZLE","BOMB!!!!!!!!"];
async function run() {
  await t.delay(300);
  t.print("RAMIS ENTERPRISES PRESENTS N.F.U. FOOTBALL"); t.print("");
  let instr = await t.input("DO YOU WISH INSTRUCTIONS");
  if (instr.toUpperCase() !== "NO") {
    t.print("THIS IS A GAME FOR 2 TEAMS. EACH TEAM HAS THE SAME 20 PLAYS.");
    t.print("THE MORE SIMILAR THE PLAYS, THE LESS YARDAGE GAINED.");
    t.print("TO PUNT OR ATTEMPT A FIELD GOAL, INPUT 77,77.");
    t.print("TO SEE SCORES, INPUT 99,99.");
    t.print("ANSWER ALL QUESTIONS YES OR NO.");
    t.print("GAME IS PLAYED UNTIL PLAYERS TERMINATE.");
    t.print("PLEASE PREPARE A TAPE AND RUN.");
  }
  let H = [0, 0]; let P = 50; let D = 1; let S = 50; let T = 1;
  let team1 = [], team2 = [];
  for (let i = 1; i <= 20; i++) team1.push(i);
  for (let i = 1; i <= 20; i++) team2.push(i);
  for (let i = team1.length-1; i>0; i--) { let j=Math.floor(Math.random()*(i+1)); [team1[i], team1[j]] = [team1[j], team1[i]]; }
  for (let i = team2.length-1; i>0; i--) { let j=Math.floor(Math.random()*(i+1)); [team2[i], team2[j]] = [team2[j], team2[i]]; }
  t.print("TEAM 1 PLAYS:"); for (let i=0;i<20;i++) t.print(plays[i] + " = " + team1[i]);
  t.print("TEAM 2 PLAYS:"); for (let i=0;i<20;i++) t.print(plays[i] + " = " + team2[i]);
  t.print("TEAM 1 DEFENDS 0 YD. GOAL -- TEAM 2 DEFENDS 100 YD. GOAL");
  T = Math.floor(Math.random()*2)+1;
  t.print("COIN FLIPPED: TEAM " + T + " RECEIVES");
  P = T === 1 ? 100 : 0;
  let dir = T === 1 ? -1 : 1;
  while (true) {
    let opp = 3 - T;
    t.print("TEAM " + T + " DOWN " + D + " ON " + P);
    let yd = Math.abs((T===1 ? P : 100-P) - (T===1 ? S : 100-S));
    if (D !== 1) t.print(yd + " YARDS TO 1ST DOWN");
    if (D === 4) {
      let punt = await t.input("TEAM " + T + " WANT TO PUNT");
      if (punt.toUpperCase() === "YES") {
        let k = Math.floor(35 * Math.random()) + 25;
        P += dir * k; T = opp; D = 1; S = P;
        t.print("PUNT GOES " + k + " YARDS. NOW ON " + P);
        continue;
      }
    }
    let p1 = parseInt(await t.input("OFFENSIVE PLAY NUMBER"));
    let p2 = parseInt(await t.input("DEFENSIVE PLAY NUMBER"));
    if (p1 === 99 && p2 === 99) { t.print("SCORE: TEAM 1 " + H[0] + " TEAM 2 " + H[1]); continue; }
    if (p1 === 77 && p2 === 77) {
      let fg = await t.input("ATTEMPT FIELD GOAL");
      if (fg.toUpperCase() === "YES") {
        let dist = Math.floor(35 * Math.random()) + 20;
        t.print("KICK IS " + dist + " YARDS LONG");
        P += dir * dist;
        if (Math.random() < 0.35) t.print("FIELD GOAL GOOD! 3 POINTS!");
        else { t.print("NO GOOD."); T = opp; D = 1; S = P; continue; }
        H[T-1] += 3; t.print("SCORE: TEAM 1 " + H[0] + " TEAM 2 " + H[1]);
        T = 3 - T; D = 1; P = T === 1 ? 20 : 80; S = P;
        continue;
      }
    }
    let i1 = team1.indexOf(p1);
    let i2 = team2.indexOf(p2);
    if (i1 === -1 || i2 === -1) { t.print("INVALID PLAY NUMBER"); continue; }
    let diff = Math.abs(i1 - i2);
    let gain = Math.floor((diff / 19) * (Math.abs(P-50) + 25) * Math.random() - 5);
    if (gain > 0) t.print("GAIN OF " + gain);
    else if (gain === 0) t.print("NO GAIN");
    else t.print("LOSS OF " + (-gain));
    P = T === 1 ? P - gain : P + gain;
    if (P <= 0 || P >= 100) {
      t.print("TOUCHDOWN! TEAM " + T + " SCORES!"); H[T-1] += 7;
      t.print("SCORE: TEAM 1 " + H[0] + " TEAM 2 " + H[1]);
      T = 3 - T; P = T === 1 ? 20 : 80; D = 1; S = P;
      continue;
    }
    if ((T === 1 && P <= S - 10) || (T === 2 && P >= S + 10)) { D = 1; S = P; t.print("FIRST DOWN!"); }
    else { D++; if (D > 4) { t.print("TURNOVER"); T = opp; D = 1; S = P; } }
  }
}
run();
</script>
</body>
</html>
