<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>TARGET - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">TARGET.BAS - Target</span><div class="terminal-controls"><a href="../index.html">â†?BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-credit">Written by: H. David Crockett</div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'TARGET'});
async function run() {
  await t.delay(300);
  t.print("TARGET - ARTILLERY DRILL");
  t.print("A TARGET IS PLACED AT A RANDOM RANGE.");
  t.print("YOU HAVE 5 SHOTS TO HIT IT.");
  let target = Math.floor(Math.random() * 100) + 1;
  for (let shot = 1; shot <= 5; shot++) {
    let range = parseInt(await t.input("SHOT " + shot + " - ENTER RANGE"));
    if (range === target) { t.print("HIT! YOU GOT IT IN " + shot + " SHOTS!"); break; }
    if (range < target) t.print("SHORT");
    else t.print("LONG");
    if (shot === 5) t.print("THE TARGET WAS AT " + target);
  }
  await t.delay(3000);
  window.location.href="../index.html";
}
run();
</script>
</body>
</html>
