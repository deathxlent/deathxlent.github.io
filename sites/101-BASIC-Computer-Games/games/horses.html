<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>HORSES - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">HORSES.BAS - Horse Race</span><div class="terminal-controls"><a href="../index.html">← BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'HORSES'});
const horseNames = ["MAN O'WAR","CITATION","WHIRLAWAY","ASSAULT","SEABISCUIT","GALLANT FOX","STYMIE","COALTOWN"];
const odds = [3,4,5,8,9,11,20,30];
async function run() {
  await t.delay(300);
  t.print("HORSE RACE");
  t.print("EXAMPLE OF BET; 1,2,200,0");
  t.print("SEVENTH = 1 MILE, 3 YR. OLDS POST2:35");
  t.print("POST 2:35");
  let bets = [];
  while (true) {
    let inp = await t.input("ENTER HORSE(1-8), WIN/PLACE/SHOW(1,2,3), WAGER, AND 0/1");
    let parts = inp.split(',').map(s => parseInt(s.trim()));
    if (parts.length < 4) { t.print("INVALID"); continue; }
    let [horse, wps, wager, more] = parts;
    if (horse < 1 || horse > 8 || wps < 1 || wps > 3) { t.print("INVALID HORSE OR BET TYPE"); continue; }
    if (wager < 2 || wager > 300) { t.print("BET MUST BE $2-$300"); continue; }
    bets.push({horse, wps, wager});
    if (more === 0) break;
  }
  t.print("THEY'RE OFF AND RUNNING -");
  let pos = [0,0,0,0,0,0,0,0];
  let order = [1,2,3,4,5,6,7,8];
  let M = odds.map(o => (100 + 50 * o) / (o + 1));
  let calls = ["AS THEY BREAK FROM THE GATE","AT THE 1/4 MILE POLE","NEARING THE HALFWAY MARK","MIDWAY IN THE RACE","AT 5/8 OF A MILE","ROUNDING THE TURN","COMING DOWN THE STRETCH","FINISH"];
  for (let k = 0; k < 8; k++) {
    for (let j = 0; j < 8; j++) pos[j] += Math.random() * M[j];
    for (let i = 7; i >= 0; i--) {
      for (let j = 1; j <= i; j++) {
        if (pos[order[j-1]-1] < pos[order[j]-1] || (pos[order[j-1]-1] === pos[order[j]-1] && Math.random() > 0.5)) {
          [order[j-1], order[j]] = [order[j], order[j]];
        }
      }
    }
    t.print(calls[k]);
    t.print("POS. HORSE         LENGTHS BEHIND");
    let lead = pos[order[0]-1];
    for (let i = 0; i < 8; i++) {
      let h = order[i];
      let behind = i === 0 ? 0 : lead - pos[h-1];
      t.print((i+1) + "   " + horseNames[h-1] + "   " + behind.toFixed(1));
    }
  }
  t.print("");
  t.print("$2 MUTUELS PAID:");
  t.print("             STRAIGHT    PLACE      SHOW");
  for (let i = 0; i < 3; i++) {
    let h = order[i];
    let straight = 2 * odds[h-1] / 1;
    let place = 2 * odds[h-1] / 2;
    let show = 2 * odds[h-1] / 3;
    t.print(horseNames[h-1] + "   " + straight.toFixed(2) + "     " + place.toFixed(2) + "     " + show.toFixed(2));
  }
  let total = 0;
  for (let b of bets) {
    let finishPos = order.indexOf(b.horse) + 1;
    let won = 0;
    if (b.wps === 1 && finishPos === 1) won = b.wager * odds[b.horse-1] / 1;
    else if (b.wps === 2 && finishPos <= 2) won = b.wager * odds[b.horse-1] / 2;
    else if (b.wps === 3 && finishPos <= 3) won = b.wager * odds[b.horse-1] / 3;
    if (won > 0) t.print("YOU COLLECT $" + won.toFixed(2) + " ON " + horseNames[b.horse-1]);
    else t.print("TEAR UP YOUR TICKET ON " + horseNames[b.horse-1]);
    total += won - b.wager;
  }
  if (total >= 0) t.print("YOUR TOTAL WINNINGS AMOUNT TO $" + total.toFixed(2));
  else t.print("YOUR TOTAL LOSSES AMOUNT TO $" + Math.abs(total).toFixed(2));
  await t.delay(5000);
  window.location.href = "../index.html";
}
run();
</script>
</body>
</html>
