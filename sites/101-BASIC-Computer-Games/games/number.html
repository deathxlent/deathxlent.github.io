<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>NUMBER - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">NUMBER.BAS - Number Guessing</span><div class="terminal-controls"><a href="../index.html">â†?BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-credit">Written by: Tom Adametx</div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'NUMBER'});
async function run() {
  await t.delay(300);
  t.print("NUMBER GUESSING GAME");
  t.print("I'M THINKING OF A NUMBER BETWEEN 1 AND 100.");
  let N = Math.floor(Math.random() * 100) + 1;
  let count = 0;
  while (true) {
    let g = parseInt(await t.input("YOUR GUESS"));
    count++;
    if (g < N) t.print("TOO LOW");
    else if (g > N) t.print("TOO HIGH");
    else { t.print("RIGHT! YOU GOT IT IN " + count + " GUESSES!"); break; }
  }
  await t.delay(2000);
  window.location.href="../index.html";
}
run();
</script>
</body>
</html>
