<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ORBIT - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">ORBIT.BAS - Orbit</span><div class="terminal-controls"><a href="../index.html">â†?BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-credit">Written by: Jeff Lederer</div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'ORBIT'});
async function run() {
  await t.delay(300);
  t.print("ORBIT - SIMULATED ORBIT OF A SATELLITE");
  t.print("GIVEN INITIAL DISTANCE AND VELOCITY, I WILL");
  t.print("COMPUTE THE ORBITAL PARAMETERS.");
  let R = parseFloat(await t.input("INITIAL DISTANCE (EARTH RADII)"));
  let V = parseFloat(await t.input("INITIAL VELOCITY (KM/SEC)"));
  let GM = 398600;
  let a = 1 / (2/R - V*V/GM);
  if (a <= 0) { t.print("ESCAPE VELOCITY EXCEEDED - NO ORBIT"); await t.delay(2000); window.location.href="../index.html"; return; }
  let e = Math.sqrt(1 - R*V*V/(GM) * (2 - R*V*V/GM));
  let perigee = a * (1 - e);
  let apogee = a * (1 + e);
  let period = 2 * Math.PI * Math.sqrt(a*a*a/GM);
  t.print("SEMI-MAJOR AXIS: " + a.toFixed(2) + " EARTH RADII");
  t.print("ECCENTRICITY: " + e.toFixed(4));
  t.print("PERIGEE: " + perigee.toFixed(2) + " ER, APOGEE: " + apogee.toFixed(2) + " ER");
  t.print("PERIOD: " + period.toFixed(2) + " HOURS");
  await t.delay(5000);
  window.location.href="../index.html";
}
run();
</script>
</body>
</html>
