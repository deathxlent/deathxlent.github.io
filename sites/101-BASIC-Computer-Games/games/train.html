<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>TRAIN - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">TRAIN.BAS - Train</span><div class="terminal-controls"><a href="../index.html">â†?BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-credit">Written by: Walter J. Koetke</div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'TRAIN'});
async function run() {
  await t.delay(300);
  t.print("TRAIN - RATE YOUR TRAIN OF THOUGHT");
  t.print("I WILL SHOW YOU A NUMBER. YOU MUST DECIDE IF THE");
  t.print("NEXT NUMBER IS HIGHER OR LOWER.");
  let score = 0;
  for (let i = 0; i < 10; i++) {
    let current = Math.floor(Math.random() * 100) + 1;
    let next = Math.floor(Math.random() * 100) + 1;
    t.print("CURRENT: " + current);
    let guess = await t.input("NEXT NUMBER IS (H)IGHER OR (L)OWER");
    let correct = (guess.toUpperCase() === "H" && next > current) || (guess.toUpperCase() === "L" && next < current);
    t.print("NEXT: " + next);
    if (correct) { t.print("CORRECT!"); score++; }
    else t.print("WRONG.");
  }
  t.print("YOU GOT " + score + " OUT OF 10.");
  await t.delay(2000);
  window.location.href="../index.html";
}
run();
</script>
</body>
</html>
