<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>STOCK - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">STOCK.BAS - Stock Market</span><div class="terminal-controls"><a href="../index.html">← BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'STOCK'});
async function run() {
  await t.delay(300);
  t.print("STOCK MARKET SIMULATION");
  t.print("YOU START WITH $1000. TRADE ONE STOCK.");
  t.print("BUY LOW, SELL HIGH. YOU GET 10 TRADES.");
  let money = 1000;
  let shares = 0;
  let price = 50;
  for (let turn = 1; turn <= 10; turn++) {
    let change = (Math.random() - 0.48) * 20;
    price = Math.max(1, price + change);
    t.print("TURN " + turn + ": PRICE $" + price.toFixed(2) + "  MONEY: $" + money.toFixed(2) + "  SHARES: " + shares);
    let action = await t.input("(B)UY, (S)ELL, (H)OLD");
    if (action.toUpperCase() === "B") {
      let n = parseInt(await t.input("HOW MANY SHARES"));
      let cost = n * price;
      if (cost > money) t.print("NOT ENOUGH MONEY");
      else { money -= cost; shares += n; }
    } else if (action.toUpperCase() === "S") {
      let n = parseInt(await t.input("HOW MANY SHARES"));
      if (n > shares) t.print("NOT ENOUGH SHARES");
      else { money += n * price; shares -= n; }
    }
  }
  money += shares * price;
  t.print("YOUR PORTFOLIO IS WORTH $" + money.toFixed(2));
  if (money > 1000) t.print("YOU MADE A PROFIT!");
  else t.print("YOU LOST MONEY.");
  await t.delay(3000);
  window.location.href="../index.html";
}
run();
</script>
</body>
</html>
