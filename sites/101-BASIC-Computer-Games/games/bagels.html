<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAGELS - 101 BASIC Games</title>
    <link rel="stylesheet" href="../css/terminal.css">
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <span class="terminal-title">BAGELS.BAS - Bagels Number Guessing</span>
            <div class="terminal-controls">
                <a href="../index.html">← BACK</a>
                <a href="#" onclick="location.reload()">RESTART</a>
            </div>
        </div>
        <div class="terminal-body">
            <div id="output"></div>
            <div class="terminal-input-line">
                <span class="prompt">?</span>
                <input type="text" id="input" class="terminal-input" disabled placeholder="Enter your 3-digit guess...">
            </div>
        </div>
        <div class="terminal-footer">
            <span>101 BASIC COMPUTER GAMES</span>
            <span>HTML EDITION</span>
        </div>
    </div>

    <script src="../js/terminal.js"></script>
    <script>
        const terminal = new BasicTerminal({
            outputElement: document.getElementById('output'),
            inputElement: document.getElementById('input'),
            gameTitle: 'BAGELS'
        });

        async function runGame() {
            await terminal.delay(500);

            let Y = 0;

            while (true) {
                let rules = await terminal.input("GAME OF BAGELS.  WOULD YOU LIKE THE RULES (YES OR NO)");
                if (rules.toUpperCase() !== "NO") {
                    terminal.print("");
                    terminal.print("I AM THINKING OF A THREE-DIGIT NUMBER. TRY TO GUESS");
                    terminal.print("MY NUMBER AND I WILL GIVE YOU CLUES AS FOLLOWS:");
                    terminal.print("   PICO   - ONE DIGIT CORRECT BUT IN THE WRONG POSITION");
                    terminal.print("   FERMI  - ONE DIGIT CORRECT AND IN THE RIGHT POSITION");
                    terminal.print("   BAGELS - NO DIGITS CORRECT");
                }

                let A = [];
                while (A.length < 3) {
                    let d = Math.floor(10 * Math.random());
                    if (!A.includes(d)) A.push(d);
                }

                terminal.print("");
                terminal.print("O.K.  I HAVE A NUMBER IN MIND.");

                let guessed = false;

                for (let i = 1; i <= 20; i++) {
                    terminal.print("GUESS #" + i);
                    let guessStr = await terminal.input();
                    let B = [];

                    if (guessStr.length !== 3) {
                        terminal.print("TRY GUESSING A THREE-DIGIT NUMBER.");
                        continue;
                    }

                    let valid = true;
                    for (let j = 0; j < 3; j++) {
                        let code = guessStr.charCodeAt(j);
                        if (code < 48 || code > 57) { valid = false; break; }
                        B.push(code - 48);
                    }

                    if (!valid) {
                        terminal.print("WHAT?");
                        continue;
                    }

                    if (B[0] === B[1] || B[1] === B[2] || B[0] === B[2]) {
                        terminal.print("OH, I FORGOT TO TELL YOU THAT THE NUMBER I HAVE IN");
                        terminal.print("MIND HAS NO TWO DIGITS THE SAME.");
                        continue;
                    }

                    let C = 0, D = 0;

                    for (let j = 0; j <= 1; j++) {
                        if (A[j] === B[j + 1]) C++;
                        if (A[j + 1] === B[j]) C++;
                    }
                    if (A[0] === B[2]) C++;
                    if (A[2] === B[0]) C++;

                    for (let j = 0; j < 3; j++) {
                        if (A[j] === B[j]) D++;
                    }

                    if (D === 3) {
                        terminal.print("YOU GOT IT!!!");
                        terminal.print("");
                        Y++;
                        guessed = true;
                        break;
                    }

                    let clue = "";
                    for (let j = 0; j < C; j++) clue += "PICO ";
                    for (let j = 0; j < D; j++) clue += "FERMI ";
                    if (C + D === 0) clue = "BAGELS";
                    terminal.print(clue);
                }

                if (!guessed) {
                    terminal.print("OH WELL");
                    terminal.print("THAT'S 20 GUESSES. MY NUMBER WAS " + (100 * A[0] + 10 * A[1] + A[2]));
                }

                let again = (await terminal.input("PLAY AGAIN (YES OR NO)")).toUpperCase();
                if (again !== "YES") {
                    if (Y > 0) {
                        terminal.print("");
                        terminal.print("A " + Y + "-POINT BAGELS BUFF!!!");
                    }
                    break;
                }
            }

            terminal.print("HOPE YOU HAD FUN.  BYE.");
            terminal.print("");
            terminal.print("*** Returning to menu in 3 seconds ***");
            await terminal.delay(3000);
            window.location.href = "../index.html";
        }

        runGame();
    </script>
</body>
</html>
