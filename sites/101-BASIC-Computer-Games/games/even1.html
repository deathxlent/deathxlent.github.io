<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>EVEN1 - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">EVEN1.BAS - Even Wins (Cybernetics)</span><div class="terminal-controls"><a href="../index.html">â†?BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-credit">Written by: Eric Peters</div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'EVEN1'});
async function run() {
  await t.delay(300);
  t.print("GAME OF EVEN WINS - CYBERNETIC VERSION"); t.print("");
  let instr = await t.input("DO YOU WANT INSTRUCTIONS (YES OR NO)");
  if (instr.toUpperCase() !== "NO") {
    t.print("THE GAME IS PLAYED AS FOLLOWS:");
    t.print("AT THE BEGINNING OF A GAME, A RANDOM NUMBER OF CHIPS ARE");
    t.print("PLACED ON THE BOARD. THE NUMBER OF CHIPS ALWAYS STARTS");
    t.print("AS AN ODD NUMBER. ON EACH TURN, A PLAYER MUST TAKE ONE,");
    t.print("TWO, THREE, OR FOUR CHIPS. THE WINNER IS THE PLAYER WHO");
    t.print("FINISHES WITH A TOTAL NUMBER OF CHIPS THAT IS EVEN.");
    t.print("THE COMPUTER STARTS OUT KNOWING ONLY THE RULES OF THE");
    t.print("GAME. IT GRADUALLY LEARNS TO PLAY WELL. IT SHOULD BE");
    t.print("DIFFICULT TO BEAT THE COMPUTER TWENTY GAMES IN A ROW.");
    t.print("TRY IT!!!");
    t.print("TO QUIT AT ANY TIME, TYPE '0' AS YOUR MOVE.");
  }
  let R = [[4,4,4,4,4],[4,4,4,4,4]];
  let A = 0, B = 0;
  let games = 0;
  while (true) {
    A = 0; B = 0;
    let P = Math.floor((13 * Math.random() + 9) / 2) * 2 + 1;
    if (P === 1) t.print("THERE IS 1 CHIP ON THE BOARD.");
    else t.print("THERE ARE " + P + " CHIPS ON THE BOARD.");
    let E, L, E1 = 0, L1 = 0;
    while (true) {
      E = (A/2 - Math.floor(A/2)) * 2;
      L = Math.floor((P/6 - Math.floor(P/6)) * 6 + 0.5);
      if (R[E][L] === P) {
        if (P === 1) t.print("COMPUTER TAKES 1 CHIP");
        else t.print("COMPUTER TAKES " + P + " CHIPS");
        R[E][L] = P;
        B += P; P = 0;
      } else {
        let M = R[E][L];
        if (M === 0) { t.print("GAME OVER ... YOU WIN!!!"); break; }
        P -= M; B += M;
        if (M === 1) t.print("COMPUTER TAKES 1 CHIP LEAVING " + P + " ... YOUR MOVE");
        else t.print("COMPUTER TAKES " + M + " CHIPS LEAVING " + P + " ... YOUR MOVE");
      }
      if (P === 0) {
        if (B % 2 === 0) { t.print("GAME OVER ... I WIN!!!"); break; }
        else { t.print("GAME OVER ... YOU WIN!!!"); break; }
      }
      let m = parseInt(await t.input(""));
      if (m === 0) { t.print("THANKS FOR PLAYING!"); await t.delay(2000); window.location.href="../index.html"; return; }
      if (m < 1 || m > 4 || m > P) { t.print(m + " IS AN ILLEGAL MOVE"); continue; }
      P -= m; A += m;
      if (P === 0) {
        if (A % 2 === 0) { t.print("GAME OVER ... I WIN!!!"); break; }
        else { t.print("GAME OVER ... YOU WIN!!!"); break; }
      }
    }
    if (A % 2 === 0) { /* player lost */
      if (R[E][L] > 1) R[E][L]--;
      else if (E1 !== undefined && R[E1][L1] > 1) R[E1][L1]--;
    }
    games++;
  }
}
run();
</script>
</body>
</html>
