<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FURS - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">FURS.BAS - Fur Trading</span><div class="terminal-controls"><a href="../index.html">â†?BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-credit">Written by: Dan Bachor</div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'FURS'});
const peltNames = ["MINK","BEAVER","ERMINE","FOX"];
async function run() {
  await t.delay(300);
  t.print("YOU ARE THE LEADER OF A FRENCH FUR TRADING EXPEDITION IN");
  t.print("1776 LEAVING THE LAKE ONTARIO AREA TO SELL FURS AND GET");
  t.print("SUPPLIES FOR THE NEXT YEAR. YOU HAVE A CHOICE OF THREE");
  t.print("FORTS AT WHICH YOU MAY TRADE. THE COST OF SUPPLIES");
  t.print("AND THE AMOUNT YOU RECEIVE FOR YOUR FURS WILL DEPEND");
  t.print("ON THE FORT THAT YOU CHOOSE.");
  while (true) {
    let I = 600;
    let furs = [0,0,0,0];
    t.print(""); t.print("YOU HAVE $" + I + " SAVINGS.");
    t.print("AND 190 FURS TO BEGIN THE EXPEDITION.");
    t.print("YOUR 190 FURS ARE DISTRIBUTED AMONG THE FOLLOWING");
    t.print("KINDS OF PELTS: MINK, BEAVER, ERMINE AND FOX.");
    let total = 0;
    for (let j = 0; j < 4; j++) {
      let n = parseInt(await t.input("HOW MANY " + peltNames[j] + " PELTS DO YOU HAVE"));
      furs[j] = n;
      total += n;
    }
    if (total > 190) { t.print("YOU MAY NOT HAVE THAT MANY FURS."); continue; }
    while (total < 190) {
      let diff = 190 - total;
      t.print("ONLY " + total + " FURS. YOU NEED " + diff + " MORE.");
      for (let j = 0; j < 4; j++) {
        let add = parseInt(await t.input("ADD " + peltNames[j]));
        if (isNaN(add)) add = 0;
        if (total + add > 190) { t.print("TOO MANY!"); add = 0; }
        furs[j] += add; total += add;
        if (total >= 190) break;
      }
    }
    let fort = parseInt(await t.input("TRADE AT FORT 1 (HOCHELAGA), 2 (STADACONA), OR 3 (NEW YORK)"));
    let prices = [0,0,0,0];
    if (fort === 1) {
      I -= 160;
      prices[0] = Math.floor((.2*Math.random()+.7)*100)/100;
      prices[1] = Math.floor((.2*Math.random()+.75)*100)/100;
      prices[2] = Math.floor((.2*Math.random()+.65)*100)/100;
      prices[3] = Math.floor((.2*Math.random()+.80)*100)/100;
      t.print("SUPPLIES AT FORT HOCHELAGA COST $150.00");
      t.print("YOUR TRAVEL EXPENSES TO HOCHELAGA WERE $10.00");
    } else if (fort === 2) {
      I -= 140;
      let p = Math.floor(10 * Math.random()) + 1;
      if (p <= 2) { furs[1] = 0; t.print("YOUR BEAVER WERE LOST ON THE PORTAGE."); }
      else if (p <= 6) t.print("YOU ARRIVED SAFELY AT FORT STADACONA.");
      else if (p <= 8) { t.print("YOUR CANOE UPSET IN THE LACHINE RAPIDS! ALL FURS LOST!"); furs = [0,0,0,0]; }
      else { furs[3] = 0; t.print("YOUR FOX PELTS WERE NOT CURED PROPERLY."); }
      prices[0] = Math.floor((.3*Math.random()+.85)*100)/100;
      prices[1] = Math.floor((.2*Math.random()+.90)*100)/100;
      prices[2] = Math.floor((.15*Math.random()+.80)*100)/100;
      prices[3] = Math.floor((.2*Math.random()+.85)*100)/100;
      t.print("SUPPLIES AT FORT STADACONA COST $125.00");
      t.print("YOUR TRAVEL EXPENSES TO STADACONA WERE $15.00");
    } else if (fort === 3) {
      I -= 105;
      let p = Math.floor(10 * Math.random()) + 1;
      if (p <= 2) { t.print("YOU WERE ATTACKED BY IROQUOIS. ALL KILLED. GAME OVER."); await t.delay(3000); window.location.href="../index.html"; return; }
      else if (p <= 6) t.print("YOU ARRIVED SAFELY AT FORT NEW YORK.");
      else if (p <= 8) { t.print("YOU ESCAPED IROQUOIS RAIDERS BUT LOST ALL FURS."); furs = [0,0,0,0]; }
      else { furs[0] = Math.floor(furs[0]/2); furs[1] = Math.floor(furs[1]/2); t.print("YOUR MINK AND BEAVER WERE DAMAGED. HALF PRICE."); }
      prices[0] = Math.floor((.15*Math.random()+1.05)*100)/100;
      prices[1] = Math.floor((.25*Math.random()+1.00)*100)/100;
      prices[2] = Math.floor((.15*Math.random()+.95)*100)/100;
      prices[3] = Math.floor((.25*Math.random()+1.10)*100)/100;
      t.print("SUPPLIES AT NEW YORK COST $80.00");
    } else continue;
    I += prices[0]*furs[0] + prices[1]*furs[1] + prices[2]*furs[2] + prices[3]*furs[3];
    t.print("MINK SOLD FOR $" + (prices[0]*furs[0]).toFixed(2));
    t.print("BEAVER SOLD FOR $" + (prices[1]*furs[1]).toFixed(2));
    t.print("ERMINE SOLD FOR $" + (prices[2]*furs[2]).toFixed(2));
    t.print("FOX SOLD FOR $" + (prices[3]*furs[3]).toFixed(2));
    t.print("YOU NOW HAVE $" + I.toFixed(2) + " INCLUDING SAVINGS.");
    let trade = await t.input("DO YOU WANT TO TRADE FURS NEXT YEAR");
    if (trade.toUpperCase() !== "YES") { t.print("YOU ENDED YOUR FUR TRADING WITH $" + I.toFixed(2) + "."); break; }
  }
  await t.delay(3000);
  window.location.href = "../index.html";
}
run();
</script>
</body>
</html>
