<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>EVEN - 101 BASIC Games</title><link rel="stylesheet" href="../css/terminal.css"></head>
<body>
<div class="terminal-container"><div class="terminal-header"><span class="terminal-title">EVEN.BAS - Even Wins</span><div class="terminal-controls"><a href="../index.html">← BACK</a><a href="#" onclick="location.reload()">RESTART</a></div></div>
<div class="terminal-body"><div id="output"></div><div class="terminal-input-line"><span class="prompt">?</span><input type="text" id="input" class="terminal-input" disabled></div></div>
<div class="terminal-footer"><span>101 BASIC COMPUTER GAMES</span><span>HTML EDITION</span></div></div>
<script src="../js/terminal.js"></script>
<script>
const t = new BasicTerminal({outputElement:document.getElementById('output'),inputElement:document.getElementById('input'),gameTitle:'EVEN'});
async function run() {
  await t.delay(300);
  t.print("THIS IS A TWO-PERSON GAME CALLED 'EVEN WINS.'");
  t.print("TO PLAY THE GAME, THE PLAYERS NEED 27 MARBLES OR");
  t.print("OTHER OBJECTS ON A TABLE.");
  t.print("THE 2 PLAYERS ALTERNATE TURNS, WITH EACH PLAYER");
  t.print("REMOVING FROM 1 TO 4 MARBLES ON EACH MOVE. THE GAME");
  t.print("ENDS WHEN THERE ARE NO MARBLES LEFT, AND THE WINNER");
  t.print("IS THE ONE WITH AN EVEN NUMBER OF MARBLES.");
  t.print("THE ONLY RULES ARE THAT (1) YOU MUST ALTERNATE TURNS,");
  t.print("(2) YOU MUST TAKE BETWEEN 1 AND 4 MARBLES EACH TURN,");
  t.print("AND (3) YOU CANNOT SKIP A TURN.");
  while (true) {
    let M1 = 0, Y1 = 0;
    let c = await t.input("TYPE 1 IF YOU WANT TO GO FIRST, 0 IF YOU WANT ME TO GO FIRST");
    let T = 27, goFirst = (c !== "0");
    if (goFirst) {
      while (true) {
        t.print(""); t.print("TOTAL = " + T); t.print("");
        let y = parseInt(await t.input("WHAT IS YOUR FIRST MOVE (1-4)"));
        if (y < 1 || y > 4) { t.print("MUST BE BETWEEN 1 AND 4."); continue; }
        if (y > T) { t.print("NOT ENOUGH MARBLES."); continue; }
        Y1 += y; T -= y;
        if (T === 0) break;
        t.print("TOTAL = " + T); t.print("YOUR TOTAL IS " + Y1);
        let R = T - 6 * Math.floor(T / 6);
        let isEven = Y1 % 2 === 0;
        let M;
        if (isEven) {
          if (R > 1 && R <= 5) M = R - 1; else M = 1;
        } else {
          if (T < 4) M = T;
          else if (R > 3) M = (R >= 4 && R <= 5) ? 1 : 4;
          else M = R + 1;
        }
        M1 += M; T -= M;
        t.print("I PICK UP " + M + " MARBLES.");
        if (T === 0) break;
        t.print("TOTAL = " + T);
      }
    } else {
      while (true) {
        if (T === 27) { M1 += 2; T -= 2; t.print("I PICK UP 2 MARBLES."); }
        if (T === 0) break;
        t.print("TOTAL = " + T); t.print("MY TOTAL IS " + M1);
        let y = parseInt(await t.input("YOUR MOVE (1-4)"));
        if (y < 1 || y > 4) { t.print("MUST BE BETWEEN 1 AND 4."); continue; }
        if (y > T) { t.print("NOT ENOUGH MARBLES."); continue; }
        Y1 += y; T -= y;
        if (T === 0) break;
        t.print("TOTAL = " + T); t.print("YOUR TOTAL IS " + Y1);
        let R = T - 6 * Math.floor(T / 6);
        let isEven = Y1 % 2 === 0;
        let M;
        if (isEven) {
          if (R > 1 && R <= 5) M = R - 1; else M = 1;
        } else {
          if (T < 4) M = T;
          else if (R > 3) M = (R >= 4 && R <= 5) ? 1 : 4;
          else M = R + 1;
        }
        M1 += M; T -= M;
        t.print("I PICK UP " + M + " MARBLES.");
        if (T === 0) break;
        t.print("TOTAL = " + T);
      }
    }
    t.print("THAT IS ALL OF THE MARBLES.");
    t.print("MY TOTAL IS " + M1 + "  YOUR TOTAL IS " + Y1);
    if (M1 % 2 === 0) t.print("I WON.");
    else t.print("YOU WON.");
    let again = await t.input("PLAY AGAIN? (1=YES, 0=NO)");
    if (again !== "1") break;
  }
  t.print("OK. SEE YOU LATER.");
  await t.delay(2000);
  window.location.href = "../index.html";
}
run();
</script>
</body>
</html>
